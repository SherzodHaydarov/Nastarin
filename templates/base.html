<!DOCTYPE html>
<html lang="uz" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nastarin Pardalar — Qarshi</title>
    <meta name="google-site-verification" content="yCUuUS2tIgAEcnaGiW1hwl2Rrtr0ACMsjpZ8COGodcI" />
    <meta name="description" content="Nastarin pardalar tikish tsexi. Sifatli va chiroyli pardalar. Qarshi tuman, Yangi Xonabod MFY.">
    <meta name="keywords" content="parda, pardalar, tikish, Qarshi, Nastarin, chiroyli pardalar">
    <meta name="author" content="Nastarin Pardalar">
    <meta property="og:title" content="Nastarin Pardalar — Qarshi">
    <meta property="og:description" content="Sifatli va chiroyli pardalar. Buyurtma bering!">
    <meta property="og:url" content="https://nastarin.up.railway.app">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="{{ url_for('static', path='images/favicon_logo.png') }}">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header>
        <h1>"Nastarin" Pardalari</h1>
        <nav>
            <a href="/">Bosh sahifa</a>
            <a href="/katalog">Katalog</a>
            <a href="/buyurtma">Buyurtma</a>
            <a href="/aloqa">Aloqa</a>
            <button onclick="tungiRejim()" id="tema-tugma">🌙</button>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© 2026 Nastarin Pardalar</p>
    </footer>

<script>
    function tungiRejim() {
        document.getElementById("html-root").classList.toggle("tungi");
        const tungi = document.getElementById("html-root").classList.contains("tungi");
        localStorage.setItem("tema", tungi ? "tungi" : "kunduz");
        document.getElementById("tema-tugma").textContent = tungi ? "☀️" : "🌙";
    }

    window.onload = function() {
        const tema = localStorage.getItem("tema");
        if (tema === "tungi") {
            document.getElementById("html-root").classList.add("tungi");
            document.getElementById("tema-tugma").textContent = "☀️";
        }
    }
</script>

</body>
</html>
