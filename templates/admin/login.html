{% extends "base.html" %}

{% block content %}

<div class="login-wrapper">
    <h2>Admin kirish</h2>

    {% if xato %}
    <p class="xato">{{ xato }}</p>
    {% endif %}

    <form method="post" action="/admin/login" class="forma">
        <label>Login</label>
        <input type="text" name="login" required placeholder="Login">

        <label>Parol</label>
        <input type="password" name="parol" required placeholder="Parol">

        <button type="submit">Kirish</button>
    </form>
</div>

{% endblock %}
