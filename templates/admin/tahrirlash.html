{% extends "base.html" %}

{% block content %}

<h2>Mahsulotni tahrirlash</h2>

<div style="margin-bottom: 20px;">
    <img src="{{ mahsulot.tasviri }}" 
         style="width: 200px; height: 150px; object-fit: cover; border-radius: 8px;">
</div>

<form method="post" action="/admin/mahsulot/tahrir/{{ mahsulot.id }}"
      class="forma" enctype="multipart/form-data">

    <label>Nomi</label>
    <input type="text" name="nomi" value="{{ mahsulot.nomi }}" required>

    <label>Narxi</label>
    <input type="number" name="narxi" value="{{ mahsulot.narxi }}" required>

    <label>Yangi rasm (ixtiyoriy)</label>
    <input type="file" name="rasm" accept="image/*">
    <p style="font-size: 13px; color: #888;">Rasm yuklamasangiz, eski rasm qoladi</p>

    <button type="submit">Saqlash</button>
</form>

<a href="/admin" style="display:inline-block; margin-top: 16px; color: #8B4513;">← Orqaga</a>

{% endblock %}
