{% extends "base.html" %}

{% block content %}

<h2>Pardalar katalogi</h2>

<div class="katalog-grid">
    {% for mahsulot in mahsulotlar %}
    <div class="karta">
        <img src="/static/images/{{ mahsulot.tasviri }}" alt="{{ mahsulot.nomi }}">
        <h3>{{ mahsulot.nomi }}</h3>
        <p>{{ mahsulot.narxi }} so'm</p>
        <a href="/buyurtma?mahsulot={{ mahsulot.id }}">Buyurtma berish</a>
    </div>
    {% else %}
        <p>Hozircha mahsulot yo'q.</p>
    {% endfor %}
</div>

{% endblock %}
